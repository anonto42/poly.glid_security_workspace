name: CI and Delivery

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-delivery-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: read

jobs:
  detect:
    name: Detect changed folders
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.check.outputs.site }}
      rust_core: ${{ steps.check.outputs.rust_core }}
      wasm: ${{ steps.check.outputs.wasm }}
      docs: ${{ steps.check.outputs.docs }}
      configs: ${{ steps.check.outputs.configs }}
      infra: ${{ steps.check.outputs.infra }}
      workflows: ${{ steps.check.outputs.workflows }}
      ai_engine: ${{ steps.check.outputs.ai_engine }}
      sdk: ${{ steps.check.outputs.sdk }}
      scripts: ${{ steps.check.outputs.scripts }}
      repinfo: ${{ steps.check.outputs.repinfo }}
      root: ${{ steps.check.outputs.root }}
      unknown: ${{ steps.check.outputs.unknown }}
      full: ${{ steps.check.outputs.full }}
      run_all: ${{ steps.scope.outputs.run_all }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        run: |
          if [ "${{ github.event.deleted || false }}" = "true" ]; then
            base="${{ github.sha }}"
            head="${{ github.sha }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before || github.sha }}"
            head="${{ github.sha }}"
          fi
          result=$(node scripts/ops/polyglid-ops.mjs detect "$base" "$head")
          echo "$result"
          for key in $(echo "$result" | jq -r 'keys[]'); do
            echo "$key=$(echo "$result" | jq -r --arg key "$key" '.[$key]')" >> "$GITHUB_OUTPUT"
          done
      - id: scope
        name: Resolve selective or full run
        shell: bash
        env:
          FULL_CHANGE: ${{ steps.check.outputs.full }}
          DELETED_REF: ${{ github.event.deleted || false }}
        run: |
          run_all=false
          if [[ "$GITHUB_REF" == refs/tags/v* ]] && [ "$DELETED_REF" != "true" ]; then
            run_all=true
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            run_all=true
          elif [ "$FULL_CHANGE" = "true" ]; then
            run_all=true
          fi
          echo "run_all=$run_all" >> "$GITHUB_OUTPUT"
          echo "Full validation requested: $run_all"

  rust-format:
    name: Rust · Format check
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.rust_core == 'true' || needs.detect.outputs.wasm == 'true' || needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  rust-clippy:
    name: Rust · Clippy
    needs: [detect, rust-format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install desktop dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --workspace --all-targets --exclude polyglid-site -- -D warnings

  rust-build:
    name: Rust · Build workspace
    needs: rust-clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install desktop dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --workspace --exclude polyglid-site

  rust-test:
    name: Rust · Run tests
    needs: rust-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install desktop dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --workspace --exclude polyglid-site

  wasm-build:
    name: WASM · Build Recon Probe
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.wasm == 'true' || needs.detect.outputs.rust_core == 'true' || needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked -p recon-probe --target wasm32-wasip1 --release

  wasm-test:
    name: WASM · Test Recon Probe
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p recon-probe

  config-test:
    name: Config · Test crate and syntax
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.configs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p polyglid-config
      - name: Check JavaScript configuration syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find configs -type f -name '*.js' -print0)

  sdk:
    name: SDK · Validate template and examples
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - run: cargo check --locked --manifest-path sdk/Cargo.toml --workspace --target wasm32-wasip1

  ai:
    name: AI · Build engine
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.ai_engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/ai/rust
      - run: cargo build --locked --release --manifest-path tools/ai/rust/Cargo.toml

  docs:
    name: Docs · Validate required files
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: test -s README.md && test -s docs/architecture/README.md && test -s docs/architecture/PROJECT_FLOW.md && test -s docs/development/CI_DELIVERY.md

  workflows:
    name: Operations · Validate scripts
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.workflows == 'true' || needs.detect.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: node --check scripts/ops/polyglid-ops.mjs
      - run: node --check scripts/ops/sync-repo.mjs
      - run: bash -n scripts/ops/detect-changes.sh
      - run: bash -n scripts/ops/test-detect-changes.sh
      - run: bash -n scripts/ops/mvp-smoke.sh
      - run: bash scripts/ops/test-detect-changes.sh
      - run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  infrastructure:
    name: Infrastructure · Validate required files
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: test -s infrastructure/wpm/init.sql

  site-build:
    name: Website · Generate static site
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.site == 'true' || needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: site
          add-job-id-key: "false"
      - run: node scripts/ops/polyglid-ops.mjs site-build

  mvp-smoke:
    name: MVP · Run real CLI and WASM flow
    needs: detect
    if: needs.detect.outputs.run_all == 'true' || needs.detect.outputs.rust_core == 'true' || needs.detect.outputs.wasm == 'true' || needs.detect.outputs.scripts == 'true' || needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - run: scripts/ops/mvp-smoke.sh

  pages:
    name: Website · Deploy GitHub Pages
    needs: [detect, site-build, result]
    if: >-
      always() &&
      needs.result.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      ((github.event_name == 'push' &&
        (needs.detect.outputs.site == 'true' || needs.detect.outputs.root == 'true' || needs.detect.outputs.workflows == 'true')) ||
       github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-site.yml

  metadata:
    name: Repository · Sync metadata
    needs: [detect, result]
    if: always() && needs.result.result == 'success' && needs.detect.outputs.repinfo == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/repo-sync.yml
    secrets: inherit

  result:
    name: CI result
    if: always()
    needs:
      - detect
      - rust-format
      - rust-clippy
      - rust-build
      - rust-test
      - wasm-build
      - wasm-test
      - config-test
      - sdk
      - ai
      - docs
      - workflows
      - infrastructure
      - site-build
      - mvp-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Require all executed validation branches to pass
        env:
          RESULTS: ${{ toJson(needs) }}
          FULL_RUN: ${{ needs.detect.outputs.run_all }}
        run: |
          echo "$RESULTS" | jq .
          if [ "$FULL_RUN" = "true" ] && echo "$RESULTS" | jq -e 'to_entries | any(.value.result != "success")' >/dev/null; then
            echo "::error::A full run requires every validation branch to execute and pass"
            exit 1
          fi
          if echo "$RESULTS" | jq -e '[.[] | .result] | any(. == "failure" or . == "cancelled")' >/dev/null; then
            echo "::error::One or more CI branches failed or were cancelled"
            exit 1
          fi

  preview:
    name: Preview · Package Linux snapshot
    needs: [detect, result]
    if: >-
      always() &&
      needs.result.result == 'success' &&
      !startsWith(github.ref, 'refs/tags/v') &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main' &&
        (needs.detect.outputs.run_all == 'true' || needs.detect.outputs.rust_core == 'true' || needs.detect.outputs.wasm == 'true' || needs.detect.outputs.configs == 'true' || needs.detect.outputs.root == 'true')) ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install desktop dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - name: Resolve preview version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          echo "label=v${version}-dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build preview applications and plugin
        run: |
          cargo build --locked --release -p polyglid-cli -p polyglid-desktop
          cargo build --locked --release -p recon-probe --target wasm32-wasip1
          target/release/polyglid plugin componentize target/wasm32-wasip1/release/recon_probe.wasm recon-probe.component.wasm
      - name: Package preview
        run: |
          mkdir -p package/plugins
          cp target/release/polyglid package/
          cp target/release/polyglid-desktop package/
          cp recon-probe.component.wasm package/plugins/
          cp README.md LICENSE-MIT LICENSE-APACHE package/
          tar -C package -czf polyglid-linux-preview.tar.gz .
          sha256sum polyglid-linux-preview.tar.gz > polyglid-linux-preview.tar.gz.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: polyglid-${{ steps.version.outputs.label }}-linux-x86_64
          path: |
            polyglid-linux-preview.tar.gz
            polyglid-linux-preview.tar.gz.sha256
          retention-days: 14
          if-no-files-found: error
      - name: Write preview summary
        run: |
          echo "### Preview ${{ steps.version.outputs.label }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the Linux archive from this run's Artifacts section." >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Release · Build, publish, and verify
    needs: result
    if: >-
      always() &&
      needs.result.result == 'success' &&
      github.event_name == 'push' &&
      github.event.created == true &&
      github.event.deleted != true &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ github.ref_name }}

  delivery-result:
    name: Delivery result
    if: always()
    needs:
      - result
      - pages
      - metadata
      - preview
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Require every executed delivery branch to pass
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS" | jq .
          if echo "$RESULTS" | jq -e '[.[] | .result] | any(. == "failure" or . == "cancelled")' >/dev/null; then
            echo "::error::CI validation, preview, deployment, metadata synchronization, or release failed"
            exit 1
          fi

  cache-cleanup:
    name: Cache · Remove unused entries
    needs: delivery-result
    if: >-
      always() &&
      needs.delivery-result.result == 'success' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: read
    env:
      DEFAULT_REF: refs/heads/${{ github.event.repository.default_branch }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Delete closed-PR and superseded Rust caches
        shell: bash
        run: |
          caches=$(gh cache list \
            --limit 10000 \
            --sort last_accessed_at \
            --order desc \
            --json id,key,ref,lastAccessedAt,sizeInBytes)
          cache_entries=$(jq -c '.[]' <<<"$caches")

          declare -A pull_request_states=()
          declare -A retained_rust_families=()
          deleted_count=0
          deleted_bytes=0
          deleted_closed_pr=0
          deleted_superseded=0

          while IFS= read -r cache; do
            [ -n "$cache" ] || continue

            cache_id=$(jq -r '.id' <<<"$cache")
            cache_key=$(jq -r '.key' <<<"$cache")
            cache_ref=$(jq -r '.ref' <<<"$cache")
            cache_size=$(jq -r '.sizeInBytes' <<<"$cache")

            category=
            if [[ "$cache_ref" =~ ^refs/pull/([0-9]+)/merge$ ]]; then
              pull_request_number=${BASH_REMATCH[1]}
              if [ -z "${pull_request_states[$pull_request_number]+known}" ]; then
                pull_request_states[$pull_request_number]=$(gh pr view \
                  "$pull_request_number" \
                  --json state \
                  --jq '.state')
              fi

              case "${pull_request_states[$pull_request_number]}" in
                OPEN)
                  echo "Keeping cache $cache_id for open pull request #$pull_request_number"
                  continue
                  ;;
                CLOSED|MERGED)
                  category=closed-pr
                  reason="closed pull request #$pull_request_number"
                  ;;
                *)
                  echo "::warning::Keeping cache $cache_id because pull request #$pull_request_number returned an unexpected state"
                  continue
                  ;;
              esac
            elif [ "$cache_ref" = "$DEFAULT_REF" ] &&
              [[ "$cache_key" =~ ^v0-rust-(.+)-[0-9a-f]{8}-[0-9a-f]{8}$ ]]; then
              rust_family=${BASH_REMATCH[1]}
              if [ -z "${retained_rust_families[$rust_family]+known}" ]; then
                retained_rust_families[$rust_family]=$cache_id
                echo "Keeping most recently accessed default-branch Rust cache $cache_id ($rust_family)"
                continue
              fi

              category=superseded
              reason="superseded default-branch Rust family $rust_family"
            else
              continue
            fi

            echo "Deleting cache $cache_id ($reason, $cache_key)"
            gh cache delete "$cache_id"
            deleted_count=$((deleted_count + 1))
            deleted_bytes=$((deleted_bytes + cache_size))
            if [ "$category" = "closed-pr" ]; then
              deleted_closed_pr=$((deleted_closed_pr + 1))
            else
              deleted_superseded=$((deleted_superseded + 1))
            fi
          done <<<"$cache_entries"

          deleted_mib=$((deleted_bytes / 1024 / 1024))
          {
            echo "### Cache maintenance"
            echo
            echo "Policy: delete confirmed closed-PR caches and superseded default-branch Rust cache versions"
            echo "Closed-PR entries deleted: $deleted_closed_pr"
            echo "Superseded Rust entries deleted: $deleted_superseded"
            echo "Deleted entries: $deleted_count"
            echo "Reclaimed size: approximately ${deleted_mib} MiB"
          } >> "$GITHUB_STEP_SUMMARY"
