name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed folders
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.check.outputs.site }}
      rust_core: ${{ steps.check.outputs.rust_core }}
      wasm: ${{ steps.check.outputs.wasm }}
      docs: ${{ steps.check.outputs.docs }}
      configs: ${{ steps.check.outputs.configs }}
      infra: ${{ steps.check.outputs.infra }}
      workflows: ${{ steps.check.outputs.workflows }}
      ai_engine: ${{ steps.check.outputs.ai_engine }}
      sdk: ${{ steps.check.outputs.sdk }}
      scripts: ${{ steps.check.outputs.scripts }}
      repinfo: ${{ steps.check.outputs.repinfo }}
      root: ${{ steps.check.outputs.root }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before || github.sha }}"
            head="${{ github.sha }}"
          fi
          result=$(node scripts/ops/polyglid-ops.mjs detect "$base" "$head")
          echo "$result"
          for key in $(echo "$result" | jq -r 'keys[]'); do
            echo "$key=$(echo "$result" | jq -r --arg key "$key" '.[$key]')" >> "$GITHUB_OUTPUT"
          done

  rust-format:
    name: Rust · Format check
    needs: detect
    if: needs.detect.outputs.rust_core == 'true' || needs.detect.outputs.wasm == 'true' || needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  rust-clippy:
    name: Rust · Clippy
    needs: [detect, rust-format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --exclude polyglid-site

  rust-build:
    name: Rust · Build workspace
    needs: rust-clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install desktop dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --workspace --exclude polyglid-site

  rust-test:
    name: Rust · Run tests
    needs: rust-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install desktop dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --workspace --exclude polyglid-site

  wasm-build:
    name: WASM · Build Recon Probe
    needs: detect
    if: needs.detect.outputs.wasm == 'true' || needs.detect.outputs.rust_core == 'true' || needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked -p recon-probe --target wasm32-wasip1 --release

  wasm-test:
    name: WASM · Test Recon Probe
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p recon-probe

  config-test:
    name: Config · Test polyglid-config
    needs: detect
    if: needs.detect.outputs.configs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked -p polyglid-config

  sdk:
    name: SDK · Validate plugin template
    needs: detect
    if: needs.detect.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - run: cargo check --manifest-path sdk/plugin-template/Cargo.toml --target wasm32-wasip1

  ai:
    name: AI · Build engine
    needs: detect
    if: needs.detect.outputs.ai_engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/ai/rust
      - run: cargo build --release --manifest-path tools/ai/rust/Cargo.toml

  docs:
    name: Docs · Validate files
    needs: detect
    if: needs.detect.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f README.md && test -f docs/architecture/README.md && test -f docs/architecture/PROJECT_FLOW.md

  workflows:
    name: Operations · Validate scripts
    needs: detect
    if: needs.detect.outputs.workflows == 'true' || needs.detect.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node --check scripts/ops/polyglid-ops.mjs
      - run: node --check scripts/ops/sync-repo.mjs
      - run: bash -n scripts/ops/detect-changes.sh

  infrastructure:
    name: Infrastructure · Validate layout
    needs: detect
    if: needs.detect.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -d infrastructure

  site-build:
    name: Website · Generate static site
    needs: detect
    if: needs.detect.outputs.site == 'true' || needs.detect.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: site
      - run: node scripts/ops/polyglid-ops.mjs site-build

  pages:
    name: Website · Deploy GitHub Pages
    needs: [detect, site-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-site.yml

  metadata:
    name: Repository · Sync metadata
    needs: detect
    if: needs.detect.outputs.repinfo == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/repo-sync.yml
    secrets: inherit

  result:
    name: CI result
    if: always()
    needs:
      - rust-test
      - wasm-test
      - config-test
      - sdk
      - ai
      - docs
      - workflows
      - infrastructure
      - site-build
    runs-on: ubuntu-latest
    steps:
      - name: Require all executed validation branches to pass
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS" | jq .
          if echo "$RESULTS" | jq -e '[.[] | .result] | any(. == "failure" or . == "cancelled")' >/dev/null; then
            echo "::error::One or more CI branches failed or were cancelled"
            exit 1
          fi
