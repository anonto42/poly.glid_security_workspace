name: Reusable · Release PolyGlid

on:
  workflow_call:
    inputs:
      tag:
        description: Existing version tag to release, for example v0.10.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: polyglid-release
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release tag and version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
      - id: version
        name: Require an exact version match
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must look exactly like v0.10.0"
            exit 1
          fi
          version="${TAG#v}"
          cargo_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          test "$cargo_version" = "$version" || {
            echo "::error::Tag $TAG does not match workspace version v$cargo_version"
            exit 1
          }
          plugin_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' plugins/recon-probe/polyglid.toml | head -n 1)
          test "$plugin_version" = "$version" || {
            echo "::error::Recon Probe manifest version $plugin_version does not match v$version"
            exit 1
          }
          resolved=$(git rev-parse "$TAG^{commit}")
          test "$resolved" = "$GITHUB_SHA" || {
            echo "::error::The validated commit does not match $TAG"
            exit 1
          }
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "::error::$TAG must point to a commit contained in main"
            exit 1
          }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.asset }}
    needs: plugin
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64
            archive: polyglid-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: windows-x86_64
            archive: polyglid-windows-x86_64.zip
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: macos-x86_64
            archive: polyglid-macos-x86_64.tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            asset: macos-aarch64
            archive: polyglid-macos-aarch64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build native applications
        run: cargo build --locked --release --target ${{ matrix.target }} -p polyglid-cli -p polyglid-desktop

      - name: Download bundled Recon Probe
        uses: actions/download-artifact@v8
        with:
          name: recon-probe
          path: package/plugins

      - name: Package Unix applications
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package
          cp "target/${{ matrix.target }}/release/polyglid" package/
          cp "target/${{ matrix.target }}/release/polyglid-desktop" package/
          cp README.md LICENSE-MIT LICENSE-APACHE package/
          tar -C package -czf "${{ matrix.archive }}" .

      - name: Package Windows applications
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/polyglid.exe" package/
          Copy-Item "target/${{ matrix.target }}/release/polyglid-desktop.exe" package/
          Copy-Item -Path README.md, LICENSE-MIT, LICENSE-APACHE -Destination package/
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  plugin:
    name: Build Recon Probe component
    needs: preflight
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-plugin
      - run: cargo build --locked --release -p polyglid-cli
      - run: cargo build --locked --release -p recon-probe --target wasm32-wasip1
      - name: Componentize plugin
        run: target/release/polyglid plugin componentize target/wasm32-wasip1/release/recon_probe.wasm recon-probe.component.wasm
      - name: Verify component release metadata
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          target/release/polyglid plugin inspect recon-probe.component.wasm | tee plugin-metadata.txt
          grep -F "id: polyglid.recon_probe" plugin-metadata.txt
          grep -F "version: $VERSION" plugin-metadata.txt
          grep -F -- "- dns-resolve" plugin-metadata.txt
          grep -F -- "- report-write" plugin-metadata.txt
      - uses: actions/upload-artifact@v7
        with:
          name: recon-probe
          path: recon-probe.component.wasm
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [preflight, build, plugin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect assets and checksums
        run: |
          mkdir release-assets
          find artifacts -maxdepth 2 -type f -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum polyglid-* recon-probe.component.wasm > SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.preflight.outputs.tag }}
        shell: bash
        run: |
          expected=(
            polyglid-linux-x86_64.tar.gz
            polyglid-windows-x86_64.zip
            polyglid-macos-x86_64.tar.gz
            polyglid-macos-aarch64.tar.gz
            recon-probe.component.wasm
            SHA256SUMS
          )

          verify_assets() {
            local assets
            assets=$(gh release view "$TAG" --json assets --jq '.assets[].name')
            for name in "${expected[@]}"; do
              grep -Fxq "$name" <<<"$assets" || return 1
            done
          }

          state=missing
          if gh release view "$TAG" >/dev/null 2>&1; then
            if [ "$(gh release view "$TAG" --json isDraft --jq .isDraft)" = "true" ]; then
              state=draft
            else
              state=published
            fi
          fi

          if [ "$state" = "published" ]; then
            verify_assets || {
              echo "::error::Published release $TAG is missing one or more required assets"
              exit 1
            }
            echo "Release $TAG is already complete"
            exit 0
          fi

          if [ "$state" = "missing" ]; then
            gh release create "$TAG" --verify-tag --draft --generate-notes --title "PolyGlid $TAG"
          fi
          gh release upload "$TAG" release-assets/* --clobber
          verify_assets || {
            echo "::error::Draft release $TAG is missing one or more required assets"
            exit 1
          }
          gh release edit "$TAG" --draft=false

  verify-downloads:
    name: Website · Verify latest release assets
    needs: [preflight, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require the website's latest-release links to resolve to this release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          latest=""
          for attempt in 1 2 3 4 5 6; do
            latest=$(gh release view --json tagName --jq .tagName 2>/dev/null || true)
            [ "$latest" = "$TAG" ] && break
            sleep $((attempt * 2))
          done
          test "$latest" = "$TAG" || {
            echo "::error::Latest published release is ${latest:-unavailable}, expected $TAG"
            exit 1
          }
          assets=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          for expected in \
            polyglid-linux-x86_64.tar.gz \
            polyglid-windows-x86_64.zip \
            polyglid-macos-x86_64.tar.gz \
            polyglid-macos-aarch64.tar.gz \
            recon-probe.component.wasm \
            SHA256SUMS; do
            grep -Fxq "$expected" <<<"$assets" || {
              echo "::error::Release asset $expected is missing"
              exit 1
            }
          done
