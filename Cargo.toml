[workspace]
members = [
  "crates/polyglid-cli",
  "crates/polyglid-config",
  "crates/polyglid-core",
  "crates/polyglid-events",
  "crates/polyglid-plugin-api",
  "crates/polyglid-runtime",
  "plugins/recon_probe",
  "apps/desktop/src-tauri",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.0"

[workspace.lints.rust]
unsafe_code = "forbid"
