# PolyGlid development config.

plugin_dir = "plugins"
reports_dir = "reports"
max_wasm_fuel = 25000000

# Global capabilities granted to all plugins. Keep empty unless a local
# development workflow truly needs a default.
default_capabilities = []

# A plugin-specific persistent approval.
[[approved_capabilities]]
plugin_id = "polyglid.recon_probe"
capability = "dns-resolve"

[[approved_capabilities]]
plugin_id = "polyglid.recon_probe"
capability = "report-write"
path_prefix = "reports"

# A scoped global approval example.
[[approved_capabilities]]
capability = "network-connect"
host = "example.com"
port = 443
